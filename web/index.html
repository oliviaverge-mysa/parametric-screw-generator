<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fastener Generator Chat</title>
  <link rel="stylesheet" href="/assets/styles.css?v=20260309-landing-image" />
</head>
<body>
  <section id="landing" class="landing">
    <div class="landing-overlay"></div>
    <div class="landing-content">
      <div class="landing-brand" aria-label="mysa">
        <img
          class="landing-logo"
          src="https://cdn.sanity.io/images/yi14n6wi/production/8d9313dc9d8252a660f20b1a0f47a3b7eeeccdd1-1260x572.png"
          alt="mysa"
        />
      </div>
      <h2>Fastener Generator</h2>
      <form id="landing-form" class="landing-search">
        <input id="landing-input" type="text" placeholder="Describe the fastener you want..." autocomplete="off" />
        <button id="landing-image-btn" class="landing-image-btn" type="button" aria-label="Upload image" title="Upload an image of a fastener">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 3.5h6l1.3 2H20a2 2 0 0 1 2 2v10.5a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7.5a2 2 0 0 1 2-2h3.7l1.3-2Zm3 4.2a4.2 4.2 0 1 0 0 8.4 4.2 4.2 0 0 0 0-8.4Zm0 1.7a2.5 2.5 0 1 1 0 5.0 2.5 2.5 0 0 1 0-5.0Zm-6.7.1a1 1 0 1 0 0 2 1 1 0 0 0 0-2Z" fill="currentColor"/>
          </svg>
        </button>
        <input id="landing-image-input" type="file" accept="image/*" hidden />
        <button id="landing-send-btn" type="submit">Generate</button>
      </form>
    </div>
  </section>
  <header id="global-header" class="global-header">
    <div class="global-header-left" aria-label="Sidebar controls">
      <button id="global-menu-btn" class="global-icon-btn sidebar-menu-toggle" type="button" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 7h16M4 12h16M4 17h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="brand-wordmark" aria-label="mysa logo">
        <img
          class="brand-wordmark-logo brand-wordmark-logo-light"
          src="https://cdn.sanity.io/images/yi14n6wi/production/23c8f5899505ce623af8daccfced80de54904228-1260x572.png"
          alt="mysa"
        />
        <img
          class="brand-wordmark-logo brand-wordmark-logo-dark"
          src="https://cdn.sanity.io/images/yi14n6wi/production/8d9313dc9d8252a660f20b1a0f47a3b7eeeccdd1-1260x572.png"
          alt="mysa"
        />
      </div>
    </div>
    <button id="theme-toggle-btn" class="theme-toggle" type="button" aria-label="Toggle dark mode">
      <span class="theme-toggle-thumb" aria-hidden="true"></span>
    </button>
  </header>
  <div class="app">
    <aside class="sidebar">
      <section class="recent-fasteners">
        <div class="recent-header">Recent Fasteners</div>
        <div id="sidebar-recent-grid" class="sidebar-recent-grid"></div>
      </section>
      <div class="chats-header-row">
        <div class="recent-header chats-label">Chats</div>
        <div class="chats-actions">
          <button id="new-chat-btn" class="icon-action-btn" type="button" aria-label="New chat" title="New chat"></button>
          <button id="delete-chat-btn" class="icon-action-btn" type="button" aria-label="Delete current chat" title="Delete current chat">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8.5 5h7l.75 1H20v2H4V6h3.75L8.5 5ZM6 9h12l-1 10H7L6 9Zm3 2v6h2v-6H9Zm4 0v6h2v-6h-2Z" fill="currentColor"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="chat-list" class="chat-list"></div>
    </aside>

    <main class="main">
      <section id="chat-panel" class="chat-panel">
        <div id="messages" class="messages"></div>
        <form id="composer" class="composer">
          <input id="message-input" type="text" placeholder="Describe the fastener you want..." autocomplete="off" />
          <button id="image-upload-btn" class="icon-action-btn composer-image-btn" type="button" aria-label="Upload image" title="Upload image">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 3.5h6l1.3 2H20a2 2 0 0 1 2 2v10.5a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7.5a2 2 0 0 1 2-2h3.7l1.3-2Zm3 4.2a4.2 4.2 0 1 0 0 8.4 4.2 4.2 0 0 0 0-8.4Zm0 1.7a2.5 2.5 0 1 1 0 5.0 2.5 2.5 0 0 1 0-5.0Zm-6.7.1a1 1 0 1 0 0 2 1 1 0 0 0 0-2Z" fill="currentColor"/>
            </svg>
          </button>
          <input id="image-input" type="file" accept="image/*" hidden />
          <button type="submit">Send</button>
        </form>
      </section>
      <section id="library-view" class="library-view" hidden>
        <div class="library-header">
          <h2>Fastener Library</h2>
          <p>Browse generated fasteners, rename cards, and jump back into any source chat.</p>
        </div>
        <div id="library-grid" class="library-grid"></div>
      </section>
    </main>
  </div>
  <div id="chat-context-menu" class="chat-context-menu" hidden>
    <button id="ctx-rename-chat-btn" class="toolbar-btn" type="button">Rename Chat</button>
    <button id="ctx-delete-chat-btn" class="danger-btn" type="button">Delete Chat</button>
  </div>
  <div id="library-context-menu" class="chat-context-menu" hidden>
    <button id="ctx-rename-library-btn" class="toolbar-btn" type="button">Rename</button>
  </div>

  <script type="module" src="/assets/app.js?v=20260309-landing-image"></script>
</body>
</html>
