<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Screw Generator Chat</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-top">
        <h1>Screw Generator</h1>
        <div class="sidebar-actions">
          <button id="new-chat-btn">+ New Chat</button>
          <button id="delete-chat-btn" class="danger-btn" type="button">Delete Current</button>
        </div>
      </div>
      <div id="chat-list" class="chat-list"></div>
    </aside>

    <main class="main">
      <section class="chat-panel">
        <div class="chat-toolbar">
          <button id="toggle-sidebar-btn" class="toolbar-btn" type="button">Hide Chats</button>
        </div>
        <div id="messages" class="messages"></div>
        <form id="composer" class="composer">
          <input id="message-input" type="text" placeholder="Describe the screw you want..." autocomplete="off" />
          <button type="submit">Send</button>
        </form>
      </section>
    </main>
  </div>
  <div id="chat-context-menu" class="chat-context-menu" hidden>
    <button id="ctx-rename-chat-btn" class="toolbar-btn" type="button">Rename Chat</button>
    <button id="ctx-delete-chat-btn" class="danger-btn" type="button">Delete Chat</button>
  </div>

  <script type="module" src="/assets/app.js"></script>
</body>
</html>
