<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fastener Generator Chat</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <section id="landing" class="landing">
    <div class="landing-overlay"></div>
    <div class="landing-content">
      <div class="landing-brand">mysa</div>
      <h2>Fastener Generator</h2>
      <p>Design parametric screws, bolts, and matching nuts in one flow.</p>
      <form id="landing-form" class="landing-search">
        <input id="landing-input" type="text" placeholder="Describe the fastener you want..." autocomplete="off" />
        <button id="landing-send-btn" type="submit">Generate</button>
      </form>
    </div>
  </section>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand-lockup" aria-label="Mysa brand">
          <div class="brand-icon" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span>
          </div>
          <div class="brand-wordmark">mysa</div>
        </div>
        <h1>Fastener Generator</h1>
        <p class="brand-subtitle">Parametric screws, bolts, and matching nuts.</p>
        <div class="sidebar-actions">
          <button id="new-chat-btn">+ New Chat</button>
          <button id="delete-chat-btn" class="danger-btn" type="button">Delete Current</button>
        </div>
      </div>
      <div id="chat-list" class="chat-list"></div>
    </aside>

    <main class="main">
      <section class="chat-panel">
        <div class="chat-toolbar">
          <button id="toggle-sidebar-btn" class="toolbar-btn" type="button">Hide Chats</button>
        </div>
        <div id="messages" class="messages"></div>
        <form id="composer" class="composer">
          <input id="message-input" type="text" placeholder="Describe the fastener you want..." autocomplete="off" />
          <button type="submit">Send</button>
        </form>
      </section>
    </main>
  </div>
  <div id="chat-context-menu" class="chat-context-menu" hidden>
    <button id="ctx-rename-chat-btn" class="toolbar-btn" type="button">Rename Chat</button>
    <button id="ctx-delete-chat-btn" class="danger-btn" type="button">Delete Chat</button>
  </div>

  <script type="module" src="/assets/app.js"></script>
</body>
</html>
